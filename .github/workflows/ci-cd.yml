name: CI-CD (Restaurant Booking App)

on:
  push:
    branches: [ main ]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install coverage

      - name: Django check
        run: |
          python manage.py check

      - name: Run tests with coverage
        run: |
          coverage run manage.py test || true
          coverage xml

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=${{ secrets.SONAR_PROJECT_KEY }}
            -Dsonar.organization=${{ secrets.SONAR_ORG_KEY }}
            -Dsonar.sources=.
            -Dsonar.host.url=https://sonarcloud.io
            -Dsonar.python.coverage.reportPaths=coverage.xml
            -Dsonar.exclusions=**/migrations/**,**/__pycache__/**,**/venv/**,**/staticfiles/**

  deploy:
    needs: ci
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create deployment package
        run: |
          zip -r deploy.zip . \
            -x "*.git*" \
               "*.github*" \
               "venv/*" \
               "__pycache__/*" \
               "*.pyc" \
               "db.sqlite3" \
               ".env"

      - name: Validate EB config
        run: |
          if [ -z "${{ secrets.EB_APP_NAME }}" ]; then
            echo "EB_APP_NAME missing"; exit 1; fi
          if [ -z "${{ secrets.EB_ENV_NAME }}" ]; then
            echo "EB_ENV_NAME missing"; exit 1; fi
          if [ -z "${{ secrets.AWS_REGION }}" ]; then
            echo "AWS_REGION missing"; exit 1; fi
          echo "EB config OK"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy to Elastic Beanstalk
        uses: einaregilsson/beanstalk-deploy@v22
        with:
          aws_access_key: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws_secret_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws_session_token: ${{ secrets.AWS_SESSION_TOKEN }}
          application_name: ${{ secrets.EB_APP_NAME }}
          environment_name: ${{ secrets.EB_ENV_NAME }}
          version_label: v-${{ github.run_id }}-${{ github.run_attempt }}
          region: ${{ secrets.AWS_REGION }}
          deployment_package: deploy.zip
          existing_bucket_name: ${{ secrets.EB_S3_BUCKET }}
          wait_for_deployment: true
          use_existing_version_if_available: true

  zap_scan:
    needs: deploy
    runs-on: ubuntu-latest

    steps:
      - name: Validate URL
        run: |
          TARGET="${{ secrets.EB_APP_URL }}"
          if [ -z "$TARGET" ]; then
            echo "EB_APP_URL missing"; exit 1; fi
          case "$TARGET" in
            http://*|https://*) echo "Valid URL: $TARGET" ;;
            *) echo "Invalid URL (must start with http/https)"; exit 1 ;;
          esac

      - name: Wait for app to be live
        run: |
          for i in {1..20}; do
            if curl -I "${{ secrets.EB_APP_URL }}" ; then
              echo "App is up"
              exit 0
            fi
            echo "Waiting for app..."
            sleep 15
          done
          echo "App not reachable"
          exit 1

      - name: Run OWASP ZAP Scan
        run: |
          docker pull ghcr.io/zaproxy/zaproxy:stable
          docker run --rm \
            -u root \
            ghcr.io/zaproxy/zaproxy:stable \
            zap-baseline.py \
              -t "${{ secrets.EB_APP_URL }}" \
              -a \
              -j \
              -I \
          || true